<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Number Guessing Game</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #f4f4f4;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      padding: 10px;
      width: 80%;
      margin: 10px 0;
    }
    button {
      padding: 10px 20px;
      cursor: pointer;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }
    button:hover {
      background: #0056b3;
    }
    #result {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>🎮 Guess the Number</h2>
    <p>Enter a number between 1 and 100</p>

    <input type="number" id="guess" placeholder="Enter number" />
    <br>
    <button onclick="checkGuess()">Guess</button>

    <p id="result"></p>
  </div>

  <script>
    let randomNumber = Math.floor(Math.random() * 100) + 1;

    function checkGuess() {
      let userGuess = Number(document.getElementById("guess").value);
      let result = document.getElementById("result");

      if (!userGuess) {
        result.textContent = "⚠️ Please enter a number!";
        return;
      }

      if (userGuess < randomNumber) {
        result.textContent = "📉 Too Low!";
      } else if (userGuess > randomNumber) {
        result.textContent = "📈 Too High!";
      } else {
        result.textContent = "🎉 Correct! You guessed it!";
      }
    }
  </script>

</body>
</html>
